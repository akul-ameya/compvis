experiment_name: "tinyimagenet_stage2_adaptive_allocation"

data:
  tiny_imagenet_dir: "data/raw/tiny-imagenet-200"
  subset_index_path: "data/tiny_imagenet_5pct/train_index.csv"
  synthetic_dir: "data/synthetic_sd"
  batch_size: 64
  num_workers: 4
  image_size: 224
  real_per_class: 25

training:
  epochs: 30
  optimizer: "adamw"
  learning_rate: 3e-4
  weight_decay: 0.01
  mixed_precision: true
  scheduler: "cosine"
  early_stopping_patience: 7

models:
  - backbone: "resnet18"
    num_classes: 200
  - backbone: "mobilenet_v3_large"
    num_classes: 200

generation:
  model_id: "runwayml/stable-diffusion-v1-5"
  max_images_per_class: 375
  batch_size: 4
  inference_steps: 25
  guidance_scale: 7.5
  image_size: 512
  seed: 42

synthetic_scaling:
  ratios: [5, 10, 15]
  per_class_at_ratio:
    5: 125
    10: 250
    15: 375

allocation_policies:
  - uniform
  - hard_class
  - uncertainty
  - predicted_utility
  policy_comparison_ratio: 15
  min_per_class: 5

utility_prediction:
  model: "ridge"
  features:
    - baseline_accuracy
    - confidence
    - entropy
    - compactness
    - separation
    - margin
    - synth_fidelity
    - synth_diversity
  cv_folds: 10

metrics:
  ece_bins: 15
  temperature_scaling: true
  fid: true
  cka_subsample: 2000
  worst_k_classes: 20
  corruption_types:
    - gaussian_noise
    - blur
    - brightness

pipelines:
  - name: "Baseline"
    train_data: "5pct_subset"
  - name: "Uniform DiffusionBoost"
    train_data: "5pct_subset + uniform synthetic"
  - name: "Adaptive DiffusionBoost"
    train_data: "5pct_subset + policy-allocated synthetic"
  - name: "Ceiling"
    train_data: "full_train"
