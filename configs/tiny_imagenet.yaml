dataset:
  name: tiny_imagenet
  num_classes: 200
  real_images_per_class: 25
  image_size: 224

paths:
  raw_data: data/raw/tiny-imagenet-200
  subset_index: data/tiny_imagenet_5pct/train_index.csv
  synthetic_root: data/synthetic/tiny_imagenet
  synthetic_legacy: data/synthetic_sd
  results_root: results
  figures_stage2: figures/stage2
  checkpoints_legacy: checkpoints

training:
  epochs: 30
  batch_size: 64
  num_workers: 0
  learning_rate: 3.0e-4
  weight_decay: 0.01
  mixed_precision: true
  early_stopping_patience: 7
  scheduler: cosine
  # Distance-to-centroid synthetic weighting (same-arch baseline checkpoint required)
  synthetic_aware_loss: true

generation:
  model_id: runwayml/stable-diffusion-v1-5
  max_images_per_class: 375
  batch_size: 4
  inference_steps: 25
  guidance_scale: 7.5
  image_size: 512
  seed: 42

synthetic_scaling:
  ratios: [5, 10, 15]
  per_class_at_ratio:
    5: 125
    10: 250
    15: 375

allocation:
  min_floor: 50
  max_cap: 375
  cv_folds: 10
  synthetic_loss_lambda: 5.0

metrics:
  ece_bins: 15
  worst_k_classes: 20
  cka_subsample: 2000
  linear_probe_epochs: 20
  linear_probe_lr: 0.01

scope:
  tiny_architectures: [resnet18, mobilenet_v3_small]
  cifar_architectures: [resnet18]
  cifar_pipelines: [baseline, uniform_15x, adaptive_15x, ceiling]
  adaptive_policies_tiny: [hard_class, uncertainty, predicted_utility]
